<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошельки — Админ</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <style>
        :root{--bg-body:#0a0a0a;--bg-card:#1a1a1a;--bg-card-alt:#222;--border:#333;--text-primary:#fff;--text-secondary:#ccc;--text-dim:#888;--text-dimmer:#666}[data-theme="light"]{--bg-body:#f0f2f5;--bg-card:#fff;--bg-card-alt:#f5f7fa;--border:#d0d0d0;--text-primary:#111;--text-secondary:#333;--text-dim:#777;--text-dimmer:#999}
        .theme-toggle{position:fixed;top:16px;left:20px;z-index:999;padding:6px 12px;border-radius:8px;background:var(--bg-card);border:1px solid var(--border);cursor:pointer;font-size:13px;transition:.3s;color:var(--text-primary);font-family:inherit;white-space:nowrap;display:flex;align-items:center;gap:4px}.theme-toggle:hover{background:var(--bg-card-alt)}
        .home-btn{position:fixed;top:14px;left:20px;z-index:999;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .3s;text-decoration:none}.home-btn:hover{transform:scale(1.1)}.home-btn img{width:32px;height:32px;object-fit:contain;filter:invert(1)}[data-theme="light"] .home-btn img{filter:none}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-body);padding:20px;color:var(--text-primary)}
        .header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
        h1{color:var(--text-primary)}
        .header-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
        .back-link{color:#4f46e5;text-decoration:none;font-weight:500;font-size:14px}
        .refresh-btn{background:#333;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit}
        .refresh-btn:hover{background:#444}[data-theme="light"] .refresh-btn{background:#e5e7eb;color:#000}
        .logout-btn{background:#333;color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px}
        .logout-btn:hover{background:#444}[data-theme="light"] .logout-btn{background:#e5e7eb;color:#000}
        [data-theme="light"] .back-link{color:#4f46e5}
        .seed-section{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
        .seed-section h3{font-size:14px;margin-bottom:8px;color:var(--text-secondary)}
        .seed-text{font-family:monospace;font-size:13px;color:var(--text-dim);word-break:break-all;cursor:pointer;padding:8px;background:var(--bg-card-alt);border-radius:6px}
        .seed-text.masked{filter:blur(4px);user-select:none}
        .seed-text.masked:hover{filter:none}
        .asset-section{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px}
        .asset-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px}
        .asset-header h2{font-size:16px;display:flex;align-items:center;gap:8px}
        .asset-badge{font-size:12px;padding:2px 8px;border-radius:10px;background:var(--bg-card-alt);color:var(--text-dim)}
        .address-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);flex-wrap:wrap}
        .address-row:last-child{border-bottom:none}
        .addr-value{font-family:monospace;font-size:12px;color:var(--text-primary);flex:1;min-width:150px;word-break:break-all}
        .addr-balance{font-size:13px;font-weight:600;min-width:80px;text-align:right}
        .addr-balance.positive{color:#22c55e}
        .addr-balance.zero{color:var(--text-dimmer)}
        .addr-orders{font-size:11px;color:var(--text-dim)}
        .addr-orders span{display:inline-block;margin-right:6px}
        .status-badge{font-size:11px;padding:1px 6px;border-radius:6px}
        .status-badge.pending{background:#fef3c7;color:#d97706}
        .status-badge.paid{background:#dcfce7;color:#16a34a}
        .status-badge.canceled{background:#fee2e2;color:#dc2626}
        .refresh-all{text-align:center;margin:16px 0}
        .refresh-all button{padding:10px 24px;font-size:14px}
        .loading{text-align:center;padding:40px;color:var(--text-dim)}
        .error{text-align:center;padding:20px;color:#ef4444}
        @media(max-width:600px){
            .address-row{flex-direction:column;align-items:flex-start}
            .addr-balance{text-align:left}
        }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" title="Сменить тему">
        <svg class="theme-moon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-sun" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
    <a href="/" class="home-btn"><img src="/static/logo.webp" alt="Home"></a>

    <div class="header">
        <h1>Кошельки и активы</h1>
        <div class="header-actions">
            <button class="refresh-btn" onclick="loadWallets()">Обновить</button>
            <a href="/admin" class="back-link">Заказы</a>
            <a href="/admin/support" class="back-link">Обращения</a>
            <a href="/" class="back-link">На главную</a>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>

    <div id="seedSection"></div>
    <div id="assetsSection" class="loading">Загрузка данных...</div>

    <script>
        function getToken() { return localStorage.getItem('admin_token'); }
        function checkAuth() {
            const t = getToken();
            if (!t) { window.location.href = '/admin/login'; throw new Error(); }
            return t;
        }
        function logout() { localStorage.removeItem('admin_token'); window.location.href = '/admin/login'; }

        async function loadWallets() {
            const token = checkAuth();
            document.getElementById('assetsSection').innerHTML = '<div class="loading">Загрузка...</div>';
            try {
                const resp = await fetch('/api/admin/wallets', { headers: { 'Authorization': 'Bearer ' + token } });
                if (resp.status === 401) { logout(); return; }
                const data = await resp.json();
                renderSeeds(data.seeds);
                renderAssets(data.assets);
            } catch (e) {
                document.getElementById('assetsSection').innerHTML = '<div class="error">Ошибка загрузки</div>';
            }
        }

        function renderSeeds(seeds) {
            const el = document.getElementById('seedSection');
            let html = '<div class="seed-section"><h3>Сид-фразы (нажмите чтобы показать)</h3>';
            if (seeds.tron_seed) html += '<div class="seed-text masked" onclick="this.classList.toggle(\'masked\')">TRON: ' + seeds.tron_seed + '</div>';
            if (seeds.solana_seed) html += '<div class="seed-text masked" onclick="this.classList.toggle(\'masked\')">SOL: ' + seeds.solana_seed + '</div>';
            if (seeds.eth_seed) html += '<div class="seed-text masked" onclick="this.classList.toggle(\'masked\')">ETH: ' + seeds.eth_seed + '</div>';
            if (seeds.tron_address) html += '<div class="seed-text" style="filter:none">Адрес TRON (запасной): ' + seeds.tron_address + '</div>';
            html += '</div>';
            el.innerHTML = html;
        }

        function renderAssets(assets) {
            const el = document.getElementById('assetsSection');
            if (!assets || assets.length === 0) {
                el.innerHTML = '<div class="error">Нет данных по кошелькам</div>';
                return;
            }
            let html = '';
            assets.forEach(a => {
                const hasBalance = a.total_balance > 0;
                html += '<div class="asset-section">';
                html += '<div class="asset-header">';
                html += '<h2>' + a.asset + ' <span class="asset-badge">' + a.total_orders + ' заказов</span></h2>';
                html += '<span style="font-size:18px;font-weight:700;color:' + (hasBalance ? '#22c55e' : 'var(--text-dimmer)') + '">' + a.total_balance + ' ' + a.asset + '</span>';
                html += '</div>';
                a.addresses.forEach(addr => {
                    const balClass = addr.balance > 0 ? 'positive' : 'zero';
                    const orderInfo = addr.orders.map(o =>
                        '<span class="status-badge ' + o.status + '">#' + o.order_id + ' ' + (o.amount_usdt || '') + '</span>'
                    ).join(' ');
                    html += '<div class="address-row">';
                    html += '<span class="addr-value">' + addr.address + '</span>';
                    html += '<span class="addr-balance ' + balClass + '">' + (addr.balance !== null ? addr.balance.toFixed(6) : '—') + '</span>';
                    html += '<span class="addr-orders">' + orderInfo + '</span>';
                    html += '</div>';
                });
                html += '</div>';
            });
            el.innerHTML = html;
        }

        function toggleTheme() {
            const html = document.documentElement;
            const btn = document.getElementById('themeToggle');
            if (html.dataset.theme === 'light') {
                delete html.dataset.theme;
                const moon = btn.querySelector('.theme-moon');
                const sun = btn.querySelector('.theme-sun');
                if (moon) moon.style.display = '';
                if (sun) sun.style.display = 'none';
                localStorage.setItem('theme', 'dark');
            } else {
                html.dataset.theme = 'light';
                const moon = btn.querySelector('.theme-moon');
                const sun = btn.querySelector('.theme-sun');
                if (moon) moon.style.display = 'none';
                if (sun) sun.style.display = '';
                localStorage.setItem('theme', 'light');
            }
        }
        (function initTheme() {
            const saved = localStorage.getItem('theme');
            const btn = document.getElementById('themeToggle');
            if (saved === 'light') {
                document.documentElement.dataset.theme = 'light';
                if (btn) {
                    const moon = btn.querySelector('.theme-moon');
                    const sun = btn.querySelector('.theme-sun');
                    if (moon) moon.style.display = 'none';
                    if (sun) sun.style.display = '';
                }
            }
        })();

        checkAuth();
        loadWallets();
    </script>
</body>
</html>
