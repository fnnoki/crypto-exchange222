<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            background: #1a1a1a;
            border-radius: 20px;
            padding: 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #333;
        }
        h1 { text-align: center; margin-bottom: 30px; font-size: 24px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #aaa; font-weight: 500; }
        input {
            width: 100%;
            padding: 14px;
            border: 2px solid #333;
            border-radius: 10px;
            font-size: 16px;
            background: #222;
            color: #fff;
            transition: border-color 0.3s;
        }
        input:focus { outline: none; border-color: #4f46e5; }
        button {
            width: 100%;
            padding: 14px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover { transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        [data-theme="light"] button { background: #e5e7eb; color: #000; }
        .error { color: #ef4444; text-align: center; margin-top: 15px; display: none; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #4f46e5; text-decoration: none; font-size: 14px; }
        @media (max-width: 480px) {
            .container { padding: 25px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Вход в админ-панель</h1>
        <form id="loginForm">
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="passwordInput" required placeholder="Введите пароль">
            </div>
            <button type="submit" id="loginBtn">Войти</button>
            <div class="error" id="errorMsg">Неверный пароль</div>
        </form>
        <a href="/" class="back-link">На главную</a>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const error = document.getElementById('errorMsg');
            const password = document.getElementById('passwordInput').value;

            btn.disabled = true;
            btn.textContent = 'Вход...';
            error.style.display = 'none';

            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                const data = await response.json();
                if (response.ok && data.token) {
                    localStorage.setItem('admin_token', data.token);
                    const params = new URLSearchParams(window.location.search);
                    const redirect = params.get('redirect') || '/admin';
                    window.location.href = redirect;
                } else {
                    error.style.display = 'block';
                }
            } catch (e) {
                error.textContent = 'Ошибка соединения';
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Войти';
            }
        });
    </script>
</body>
</html>
